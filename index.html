<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>JARVIS Terminal</title>
    <style>
        body { background-color: #0a0a0a; color: #00f2ff; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; height: 100vh; margin: 0; }
        #terminal { width: 90%; max-width: 800px; height: 60vh; margin-top: 50px; border: 1px solid #00f2ff; padding: 20px; overflow-y: auto; background: rgba(0, 242, 255, 0.05); }
        #input-area { width: 90%; max-width: 800px; margin-top: 20px; display: flex; flex-direction: column; gap: 10px; }
        input { background: #111; border: 1px solid #00f2ff; color: white; padding: 12px; outline: none; }
        button { background: #00f2ff; color: black; border: none; padding: 10px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <h1>J.A.R.V.I.S.</h1>
    <div id="terminal"><p>[SYSTEM]: Online. Interface corrected. Awaiting API key, sir.</p></div>
    <div id="input-area">
        <input type="password" id="api-key" placeholder="Enter OpenRouter API Key here...">
        <input type="text" id="user-input" placeholder="Awaiting orders...">
        <button onclick="askJarvis()">SEND COMMAND</button>
    </div>
    <script>
        async function askJarvis() {
            const key = document.getElementById('api-key').value;
            const userInput = document.getElementById('user-input').value;
            const terminal = document.getElementById('terminal');
            if(!key) { alert("API Key missing, sir."); return; }
            terminal.innerHTML += `<p><b>Sir:</b> ${userInput}</p>`;
            try {
                const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${key}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        mistralai/mistral-7b-instruct:free
                        "messages": [{"role": "user", "content": userInput}]
                    })
                });
                const data = await response.json();
                terminal.innerHTML += `<p><b style="color:#00f2ff">JARVIS:</b> ${data.choices[0].message.content}</p>`;
                terminal.scrollTop = terminal.scrollHeight;
            } catch (err) { terminal.innerHTML += `<p>[ERROR]: Connection failed.</p>`; }
            document.getElementById('user-input').value = "";
        }
    </script>
</body>
</html>
